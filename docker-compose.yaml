services:
  api:
    build: .
    container_name: my_api
    ports:
      - "8080:8080"
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      mongo:
        condition: service_healthy

  postgres:
    image: postgres:16
    container_name: postgres_database
    environment:
      POSTGRES_DB: NewSessionProject
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Yhjuik13
    ports:
      - "5445:5432"
    volumes:
      - postgres_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d NewSessionProject"]
      start_period: 10s
      retries: 5
      interval: 5s
      timeout: 5s

  mongo:
    image: mongo:7
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo:/data/db
    healthcheck:
      test: [ "CMD-SHELL", "mongosh --eval \"db.adminCommand('ping')\"" ]
      interval: 5s
      timeout: 5s
      start_period: 10s
      retries: 5


volumes:
  postgres_db:
  mongo:
  uploads_data: